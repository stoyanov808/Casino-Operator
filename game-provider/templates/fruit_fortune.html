<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fruit Fortune 40</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <main class="app">
    <section class="game-shell">
      <header class="top-bar game-hero">
        <div class="hero-copy">
          <div class="eyebrow">Game Provider</div>
          <h1>Fruit Fortune 40</h1>
          <p>External provider game session active.</p>
        </div>
      </header>

      <section class="slot-stage">
        <div class="jackpot-bar">
          <div class="jackpot-card grand">
            <div class="jackpot-label">Grand</div>
            <div class="jackpot-value">
              <span class="money-sign">$</span>
              <span id="jackpotGrand">10000</span>
            </div>
          </div>

          <div class="jackpot-card major">
            <div class="jackpot-label">Major</div>
            <div class="jackpot-value">
              <span class="money-sign">$</span>
              <span id="jackpotMajor">1500</span>
            </div>
          </div>

          <div class="jackpot-card minor">
            <div class="jackpot-label">Minor</div>
            <div class="jackpot-value">
              <span class="money-sign">$</span>
              <span id="jackpotMinor">250</span>
            </div>
          </div>

          <div class="jackpot-card mini">
            <div class="jackpot-label">Mini</div>
            <div class="jackpot-value">
              <span class="money-sign">$</span>
              <span id="jackpotMini">50</span>
            </div>
          </div>
        </div>

        <div id="board" class="board">
          <div id="reels" class="reels"></div>
          <svg id="lineOverlay" class="line-overlay"></svg>
        </div>

        <div id="resultBanner" class="result-banner hidden"></div>

        <div class="line-results">
          <div id="lineResults" class="win-list"></div>
        </div>

        <div class="bottom-hud">
          <div class="balance-panel">
            <div class="panel-label">Balance</div>
            <div class="balance-amount">
              <span class="money-sign">$</span>
              <span id="balance">{{ balance }}</span>
            </div>
          </div>

          <div class="spin-panel">
            <button id="spinBtn" class="spin-btn">Spin</button>
            <div id="freeSpinsPanel" class="free-spin-panel hidden"></div>
          </div>

          <div class="bet-panel">
            <label>
              <span class="panel-label">Bet</span>
              <input id="bet" type="number" min="1" step="1" value="10">
            </label>

            <button id="maxBtn" class="small-btn" type="button">Max</button>
            <button id="turboBtn" class="small-btn" type="button">Turbo</button>
            <button id="buyBonusBtn" class="small-btn" type="button">
              Buy Bonus $<span id="buyBonusCost">1000</span>
            </button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="winOverlay" class="win-overlay hidden">
    <div class="win-overlay-title">BIG WIN</div>
    <div id="winOverlayAmount" class="win-overlay-amount">$0</div>
  </div>

  <div id="revealOverlay" class="reveal-overlay hidden">
    <div class="reveal-box">
      <div class="reveal-title">Reveal Bonus</div>
      <div class="reveal-subtitle">Pick one card</div>

      <div id="revealCards" class="reveal-cards"></div>
      <div id="revealResult" class="reveal-result"></div>
    </div>
  </div>

  <div id="particles"></div>

  <script src="{{ url_for('static', filename='js/slot-40FortuneLane.js') }}"></script>
</body>
</html>
