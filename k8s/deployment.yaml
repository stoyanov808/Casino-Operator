apiVersion: apps/v1
kind: Deployment
metadata:
  name: neon-casino
  namespace: neon-casino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neon-casino
  template:
    metadata:
      labels:
        app: neon-casino
    spec:
      containers:
        - name: neon-casino
          image: ??your-registry/neon-casino:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: casino-secret
                  key: SECRET_KEY
            - name: DATABASE
              value: /data/casino.db
            - name: FLASK_DEBUG
              value: "0"
          volumeMounts:
            - name: casino-db-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: casino-db-storage
          persistentVolumeClaim:
            claimName: casino-db-pvc