apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-site
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-site
  template:
    metadata:
      labels:
        app: casino-site
    spec:
      containers:
        - name: casino-site
          image: stoyanov808/casino-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: SECRET_KEY
              value: "change-this-secret-key"
            - name: DATABASE
              value: "/data/casino.db"
          volumeMounts:
            - name: casino-db-storage
              mountPath: /data
      volumes:
        - name: casino-db-storage
          persistentVolumeClaim:
            claimName: casino-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: casino-site-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: casino-site
  ports:
    - name: http
      port: 80
      targetPort: 5000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: casino-site-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - casino.dev.local
      secretName: dev-local-tls
  rules:
    - host: casino.dev.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: casino-site-service
                port:
                  number: 80
